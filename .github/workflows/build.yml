name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test on iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run unit tests
        run: |
          set +e
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi

          xcodebuild test \
            -project SmartTimeManagement.xcodeproj \
            -scheme SmartTimeManagement \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" 2>&1 | tee xcodebuild-test.log

          TEST_EXIT=${PIPESTATUS[0]}
          if [ "$TEST_EXIT" -ne 0 ]; then
            SUMMARY="$(tail -n 120 xcodebuild-test.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
            echo "::error file=.github/workflows/build.yml,line=1,title=Xcode test failed::$SUMMARY"
            exit "$TEST_EXIT"
          fi

  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Compile iOS app without paid signing
        run: |
          set -euo pipefail

          xcodebuild clean build \
            -project SmartTimeManagement.xcodeproj \
            -scheme SmartTimeManagement \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

          APP_PATH="$(find build/Build/Products/Debug-iphoneos -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found after build."
            exit 1
          fi

          rm -rf Payload SmartTimeManagement.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload SmartTimeManagement.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTimeManagement-unsigned-ipa
          path: SmartTimeManagement.ipa
          if-no-files-found: error
          retention-days: 14
